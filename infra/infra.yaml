services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ''
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: kgbook
    ports:
      - "5432:5432"
    volumes:
      - kgbook-pgdata:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
  aladin-mcp-server:
    build:
      context: ../aladin-mcp-server
      dockerfile: Dockerfile
    env_file:
      - ../aladin-mcp-server/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  web:
    build:
      context: ../kgbook-recommend-web
      dockerfile: Dockerfile
    env_file:
      - ../kgbook-recommend-web/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - aladin-mcp-server

volumes:
  kgbook-pgdata:

