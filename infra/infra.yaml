services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ''
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - kgbook-pgdata:/var/lib/postgresql/data
      - ./scripts/01-create-database.sql:/docker-entrypoint-initdb.d/01-create-database.sql
      - ./scripts/02-init-database.sql:/docker-entrypoint-initdb.d/02-init-database.sql
      - ./scripts/03-initial-data.sql:/docker-entrypoint-initdb.d/03-initial-data.sql
  aladin-mcp-server:
    build:
      context: ../aladin-mcp-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  web:
    build:
      context: ../kgbook-recommend-web
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  kgbook-pgdata:

